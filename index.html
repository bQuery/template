<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bQuery App</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>bQuery.js Template</h1>
        <p>A dynamic client-side app built with <a href="https://github.com/bQuery/bQuery">@bquery/bquery</a></p>
      </header>

      <main>
        <!-- Counter Demo -->
        <section id="counter">
          <h2>Reactive Counter</h2>
          <p>Count: <span id="count">0</span></p>
          <p>Doubled: <span id="doubled">0</span></p>
          <div class="button-group">
            <button id="increment">Increment</button>
            <button id="decrement">Decrement</button>
            <button id="reset">Reset</button>
          </div>
        </section>

        <!-- To-Do List Demo -->
        <section id="todo">
          <h2>To-Do List</h2>
          <form id="todo-form">
            <label for="todo-input" class="sr-only">New task</label>
            <input type="text" id="todo-input" placeholder="Add a task…" required />
            <button type="submit">Add</button>
          </form>
          <ul id="todo-list"></ul>
        </section>

        <!-- Component Demo -->
        <section id="components">
          <h2>Web Components</h2>
          <greeting-card name="World"></greeting-card>
        </section>
      </main>

      <footer>
        <p>Built with <a href="https://github.com/bQuery/bQuery">bQuery.js</a></p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
